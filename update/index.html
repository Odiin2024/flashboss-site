    <style>
    /* ============================================================
       FlashBoss — title screen (index.html). The front door:
       canonical share URL + social cards + the atmospheric scene
       you enter the site through.

       Alignment model: the background image is 1344x768 (aspect 1.75).
       A .frame box is sized to that exact aspect and locked to cover a
       SINGLE screen (no zoom, no overscan). Foreground anchors (title,
       ENTER) live inside an identically-sized .frame and are placed by
       PERCENTAGE OF THE IMAGE — so "78% down" is always the door, on
       every screen shape. That is what stops the ENTER from jumping.
       Tunable hotspots: --title-y and --enter-y below.
       ============================================================ */
    :root{
        --img-ar:1.75;          /* 1344 / 768                   */
        --title-y:53%;          /* vertical hotspot: screen centre */
        --enter-y:74%;          /* vertical hotspot: the door    */
        --sky:#7ec8ff;          /* title glow — moonlit blue     */
        --gold:#f0c45a;         /* ENTER / window light          */
        --ink:#f0e6d3;          /* warm parchment text           */
        --night:#0a0a19;        /* deep edge grade               */
        --serif:'Jaro', system-ui, sans-serif;
        --sans:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *{margin:0; padding:0; box-sizing:border-box;}
    html,body{height:100%;}
    body{
        font-family:var(--sans); color:var(--ink); background:var(--night);
        min-height:100vh; min-height:100dvh; overflow:hidden;
        -webkit-font-smoothing:antialiased;
    }
    a{color:inherit; text-decoration:none;}

    .scene{position:fixed; inset:0; overflow:hidden;}

    /* a box with the image's exact aspect, sized to cover ONE screen,
       centred. No scale, no overscan — a single screen, edge to edge. */
    .frame{
        position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
        width:max(100vw, calc(100vh * var(--img-ar)));
        height:max(100vh, calc(100vw / var(--img-ar)));
    }
    .frame.scenery{z-index:0;}
    .frame.ui{z-index:3; pointer-events:none;}
    .frame.ui a{pointer-events:auto;}

    .bg{position:absolute; inset:0; background:var(--night) url('background.png') center / cover no-repeat;}

    /* atmospheric grading — vignette + sky lift + warm base glow */
    .grade{position:absolute; inset:0; z-index:1; pointer-events:none;
        background:
            radial-gradient(120% 80% at 50% 18%, rgba(126,200,255,.10) 0%, transparent 45%),
            radial-gradient(90% 60% at 50% 96%, rgba(240,180,90,.14) 0%, transparent 55%),
            radial-gradient(140% 120% at 50% 50%, transparent 44%, rgba(8,8,22,.52) 100%),
            linear-gradient(to bottom, rgba(8,8,22,.40) 0%, transparent 26% 60%, rgba(8,8,22,.60) 100%);
    }

    /* drifting embers (warm window-light motes rising past the castle) */
    .embers{position:absolute; inset:0; z-index:2; pointer-events:none;}
    .ember{position:absolute; bottom:-24px; left:var(--x); width:var(--s); height:var(--s);
        border-radius:50%; opacity:0;
        background:radial-gradient(circle, #ffe6ad 0%, rgba(255,196,110,.7) 38%, rgba(255,170,80,0) 70%);
        animation:rise var(--t) ease-in var(--delay) infinite; will-change:transform,opacity;}
    @keyframes rise{
        0%{transform:translate(0,0) scale(.5); opacity:0;}
        12%{opacity:.85;}
        70%{opacity:.6;}
        100%{transform:translate(var(--dx,12px), calc(-1 * var(--rise,72vh))) scale(1.15); opacity:0;}
    }

    /* ---------- foreground, pinned to image hotspots ---------- */
    .title-block{position:absolute; top:var(--title-y); left:50%; transform:translate(-50%,-50%);
        width:min(92vw, 1000px); text-align:center;}
    .title{font-family:var(--serif); font-weight:400; color:var(--sky);
        font-size:clamp(3.4rem, 16vw, 11rem); line-height:.9; letter-spacing:-.01em;
        text-shadow:0 0 48px rgba(110,180,255,.55), 0 0 14px rgba(170,215,255,.4), 0 4px 16px rgba(0,0,0,.85);}
    .descriptor{display:inline-block; margin-top:1.05rem; padding:.55em 1.7em;
        font-weight:500; letter-spacing:.05em;
        font-size:clamp(.95rem, 3.4vw, 1.7rem); color:rgba(255,255,255,.96);
        border-radius:3px;
        background:radial-gradient(ellipse at center, rgba(23,20,33,.6) 0%, rgba(23,20,33,.4) 46%, rgba(23,20,33,0) 72%);
        text-shadow:0 1px 6px rgba(0,0,0,.55);}

    /* ENTER — the one deliberate call to action, pinned to the door */
    .enter{position:absolute; top:var(--enter-y); left:50%; transform:translate(-50%,-50%);
        display:flex; flex-direction:column; align-items:center; gap:.5rem; cursor:pointer;}
    .enter img{display:block; width:clamp(150px, 30vw, 320px); height:auto;
        filter:drop-shadow(0 0 6px rgba(240,196,90,.35)) drop-shadow(0 6px 14px rgba(0,0,0,.7));
        animation:invite 3.6s ease-in-out infinite; transition:transform .35s ease, filter .35s ease; will-change:filter,transform;}
    @keyframes invite{
        0%,100%{filter:drop-shadow(0 0 6px rgba(240,196,90,.35)) drop-shadow(0 6px 14px rgba(0,0,0,.7));}
        50%{filter:drop-shadow(0 0 20px rgba(255,210,120,.7)) drop-shadow(0 6px 14px rgba(0,0,0,.7));}
    }
    .enter:hover img, .enter:focus-visible img{transform:scale(1.06);
        filter:drop-shadow(0 0 26px rgba(255,216,130,.95)) drop-shadow(0 0 50px rgba(255,190,90,.5)) drop-shadow(0 6px 14px rgba(0,0,0,.7));}
    .enter:focus-visible{outline:none;}

    /* footer — quiet secondary links, anchored to the screen bottom */
    footer{position:absolute; left:0; right:0; bottom:0; z-index:4;
        display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:.6rem 1.15rem;
        padding:1rem 1.25rem calc(1rem + env(safe-area-inset-bottom));
        font-size:.78rem; font-weight:500; letter-spacing:.04em;
        background:linear-gradient(to top, rgba(6,6,18,.72) 0%, transparent 100%);}
    footer a{color:rgba(255,255,255,.78); transition:color .2s, text-shadow .2s;}
    footer a:hover{color:#fff;}
    footer .bf{color:#c88282; font-weight:600;}
    footer .bf:hover{color:#e2a5a5;}
    footer .sep{width:1px; height:.85rem; background:rgba(255,255,255,.22);}
    footer .steam{color:var(--sky); font-weight:600; letter-spacing:.02em;
        text-shadow:0 0 10px rgba(126,200,255,.7), 0 0 22px rgba(126,200,255,.35); animation:pulse 3s ease-in-out infinite;}
    footer .steam:hover{color:#fff; text-shadow:0 0 14px rgba(126,200,255,1), 0 0 30px rgba(126,200,255,.7);}
    @keyframes pulse{0%,100%{text-shadow:0 0 10px rgba(126,200,255,.65), 0 0 22px rgba(126,200,255,.3);} 50%{text-shadow:0 0 15px rgba(126,200,255,.95), 0 0 32px rgba(126,200,255,.55);}}

    /* intro reveal — pure fade + blur, no transform (so it never fights
       the centring transforms on the pinned title/ENTER) */
    .reveal{opacity:0; filter:blur(8px); animation:introUp 1.15s cubic-bezier(.22,.61,.36,1) forwards;}
    .d1{animation-delay:.15s;} .d2{animation-delay:.42s;} .d3{animation-delay:.85s;} .d4{animation-delay:1.15s;}
    @keyframes introUp{to{opacity:1; filter:blur(0);}}

    /* short / landscape screens: the frame IS the screen (no aspect
       overflow), the image is pinned to its bottom so the door stays in
       view, and title/ENTER position as a true % of the screen. Sizes
       are height-based so they can't run away. */
    @media (max-height:560px){
        .frame{top:0; left:0; transform:none; width:100%; height:100%;}
        .bg{background-position:center bottom;}
        :root{--title-y:34%; --enter-y:76%;}
        .title{font-size:clamp(1.5rem, 9vh, 3.5rem);}
        .descriptor{font-size:clamp(.78rem, 4.5vh, 1.2rem); margin-top:.55rem; padding:.4em 1.3em;}
        .enter img{width:clamp(64px, 20vh, 150px);}
        footer{padding:.5rem 1rem calc(.35rem + env(safe-area-inset-bottom));}
    }
    @media (max-width:480px){
        footer{font-size:.72rem; gap:.5rem .8rem;}
    }

    /* respect reduced-motion */
    @media (prefers-reduced-motion:reduce){
        .ember{display:none;}
        .enter img, footer .steam{animation:none;}
        .reveal{animation:none; opacity:1; filter:none;}
        .title-block.reveal, .enter.reveal{transform:translate(-50%,-50%);}
    }

    /* floating language switch (top-right) */
    .lang-switch{position:fixed; top:14px; right:16px; z-index:20; font-family:var(--sans);}
    .lang-toggle{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; letter-spacing:.06em; color:var(--ink); background:rgba(10,10,25,.55); border:1px solid rgba(240,230,211,.4); padding:6px 11px; border-radius:4px; cursor:pointer; -webkit-backdrop-filter:blur(5px); backdrop-filter:blur(5px);}
    .lang-toggle:hover, .lang-toggle[aria-expanded="true"]{background:rgba(240,230,211,.95); color:var(--night); border-color:rgba(240,230,211,.95);}
    .lang-caret{font-size:8px; line-height:1; transition:transform .15s ease;}
    .lang-toggle[aria-expanded="true"] .lang-caret{transform:rotate(180deg);}
    .lang-menu{position:absolute; top:calc(100% + 6px); right:0; margin:0; padding:4px; list-style:none; background:rgba(10,10,25,.93); border:1px solid rgba(240,230,211,.4); border-radius:4px; min-width:124px; -webkit-backdrop-filter:blur(5px); backdrop-filter:blur(5px);}
    .lang-menu[hidden]{display:none;}
    .lang-menu li{margin:0;}
    .lang-menu a{display:block; font-size:12.5px; letter-spacing:.02em; color:var(--ink); padding:7px 11px; border-radius:3px;}
    .lang-menu a:hover{background:rgba(240,230,211,.95); color:var(--night);}
    .lang-menu a[aria-current="true"]{color:var(--sky);}
    .lang-menu a[aria-current="true"]:hover{color:var(--night);}
    </style>
</head>
<body>
    <div class="lang-switch">

        <ul class="lang-menu" hidden>

        </div>

        <!-- foreground, pinned to the same frame so it tracks the art -->
        <div class="frame ui">
            <div class="title-block reveal d1">
                <h1 class="title">FlashBoss</h1>
                <p class="descriptor">Flashcards with Boss Fights</p>

            <a href="home.html" class="enter reveal d3" aria-label="Enter FlashBoss">

        <footer class="reveal d4">
            <a href="packs.html">Packs</a>

            <a href="manual/">Walkthrough (beta)</a>

            <span class="sep"></span>
            <a href="report.html">Report Errors</a>
            <span class="sep"></span>
            <a class="bf" href="https://flashboss-demo.pages.dev/">BossFight</a>
        </footer>
    </div>
    <script>
    (function(){
      var sw=document.querySelector('.lang-switch'); if(!sw) return;
      var btn=sw.querySelector('.lang-toggle'), menu=sw.querySelector('.lang-menu');
      function close(){ menu.hidden=true; btn.setAttribute('aria-expanded','false'); }
      btn.addEventListener('click', function(e){ e.stopPropagation(); var o=menu.hidden; menu.hidden=!o; btn.setAttribute('aria-expanded', String(o)); });
      document.addEventListener('click', function(e){ if(!sw.contains(e.target)) close(); });
      document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
    })();
    </script>
